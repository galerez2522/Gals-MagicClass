<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>דשבורד מתמטיקה - תיכון אהרנס</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>דשבורד ניהול כיתות מתמטיקה</h1>
        <p>תיכון אהרנס · שנת הלימודים הבאה</p>
      </div>
      <div class="header-actions">
        <button id="exportLinkBtn">ייצוא לקישור</button>
        <button id="resetDataBtn" class="danger-btn">איפוס נתונים</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>✨ סקירה כללית</h2>
        <div id="overviewCards" class="overview-cards"></div>
      </section>

      <section class="panel">
        <h2>🧑‍🏫 ניהול כיתות ותלמידים</h2>
        <div class="forms-grid">
          <form id="addClassForm" class="inline-form">
            <label>
              שם כיתה
              <input name="className" required placeholder="למשל: י׳2" />
            </label>
            <button type="submit">הוספת כיתה</button>
          </form>

          <form id="addStudentForm" class="inline-form">
            <label>
              כיתה
              <select name="classId" id="studentClassSelect" required></select>
            </label>
            <label>
              שם תלמיד/ה
              <input name="studentName" required placeholder="שם מלא" />
            </label>
            <button type="submit">הוספת תלמיד/ה</button>
          </form>
        </div>
      </section>

      <section class="panel">
        <h2>🎨 תצוגה ויזואלית של הכיתות</h2>
        <div id="classVisualBoard"></div>
      </section>

      <section class="panel">
        <h2>📝 מעקב אישי והערות</h2>
        <div id="studentDetail" class="student-detail empty-state">
          בחרי תלמיד/ה מהתצוגה הוויזואלית כדי לעדכן התקדמות והערות.
        </div>
      </section>

      <section class="panel">
        <h2>🧪 מעקב מבחנים</h2>
        <form id="addTestForm" class="inline-form test-form">
          <label>
            כיתה
            <select name="classId" id="testClassSelect" required></select>
          </label>
          <label>
            נושא
            <input name="topic" required placeholder="למשל: פונקציות" />
          </label>
          <label>
            תאריך
            <input type="date" name="date" required />
          </label>
          <label>
            ממוצע כיתתי
            <input type="number" name="average" min="0" max="100" step="1" required />
          </label>
          <button type="submit">הוספת מבחן</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>תאריך</th>
                <th>כיתה</th>
                <th>נושא</th>
                <th>ממוצע</th>
              </tr>
            </thead>
            <tbody id="testsTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>📚 מעקב חומר לימודי</h2>
        <form id="addCurriculumForm" class="inline-form curriculum-form">
          <label>
            כיתה
            <select name="classId" id="curriculumClassSelect"></select>
          </label>
          <label>
            נושא חומר
            <input name="topic" required placeholder="למשל: טריגונומטריה" />
          </label>
          <label>
            סטטוס
            <select name="status" required>
              <option value="planned">מתוכנן</option>
              <option value="in_progress">בתהליך</option>
              <option value="completed">הושלם</option>
            </select>
          </label>
          <label>
            התקדמות %
            <input type="number" name="coverage" min="0" max="100" step="5" value="0" required />
          </label>
          <label class="full-width">
            הערה
            <input name="note" placeholder="למשל: נדרש עוד תרגול בית" />
          </label>
          <button type="submit">הוספת פריט חומר</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>כיתה</th>
                <th>נושא</th>
                <th>סטטוס</th>
                <th>כיסוי</th>
                <th>הערה</th>
              </tr>
            </thead>
            <tbody id="curriculumTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
