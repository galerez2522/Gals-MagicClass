<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>דשבורד מתמטיקה - תיכון אהרנס</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>דשבורד ניהול כיתות מתמטיקה</h1>
        <p>תיכון אהרנס · שנת הלימודים הבאה</p>
      </div>
      <div class="header-actions">
        <button id="exportLinkBtn">ייצוא לקישור</button>
        <button id="resetDataBtn" class="danger-btn">איפוס נתונים</button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="sidebar">
        <h2 class="sidebar-title">הכיתות שלי</h2>
        <nav id="classNav" class="class-nav"></nav>
        <form id="addClassForm" class="sidebar-add-form">
          <input name="className" required placeholder="שם כיתה, למשל: י׳2" />
          <button type="submit">+ הוספת כיתה</button>
        </form>
      </aside>

      <main id="mainContent" class="main-content"></main>
    </div>

    <script src="app.js?v=5"></script>
  </body>
</html>
